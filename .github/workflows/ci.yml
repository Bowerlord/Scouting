name: CI

# Vérifie à chaque push et pull request que le code passe le lint (ruff)
# et que la suite de tests unitaires (pytest) est verte.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint & Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installation des dépendances
        # torch/shap sont volumineux et inutiles pour lint + tests unitaires ;
        # on installe uniquement les dépendances effectivement importées par la
        # suite de tests (test_models importe src.models.clusterer → joblib + loguru)
        # pour garder la CI rapide et fiable. umap-learn est optionnel (test skippé).
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib loguru pytest ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Tests unitaires (pytest)
        run: pytest tests/ -v
