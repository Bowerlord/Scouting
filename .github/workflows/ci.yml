name: CI

# Vérifie à chaque push et pull request que le code passe le lint (ruff)
# et que la suite de tests unitaires (pytest) est verte.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint & Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installation des dépendances
        # torch/shap/xgboost sont volumineux et inutiles pour lint + tests
        # unitaires ; on installe uniquement les dépendances effectivement
        # importées par la suite de tests : test_models → src.models.clusterer
        # et src.models.talent_scorer (xgboost y est un import optionnel) ;
        # test_features → src.data.cleaner → src.data.leaguepedia (requests).
        # On garde la CI rapide et fiable. umap-learn est optionnel (test skippé).
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib loguru requests pytest pytest-cov ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Tests (pytest + couverture)
        # Seuil = couverture mesurée (65%) − 5 pts, à relever au fil des ajouts.
        # Périmètre de mesure défini dans pyproject.toml ([tool.coverage.run]).
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=60
